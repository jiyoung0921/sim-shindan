name: 料金スクレイパー

on:
  # 毎日 JST 07:00 (UTC 22:00 前日) に実行
  schedule:
    - cron: "0 22 * * *"
  # 手動実行・dry-run 対応
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (差分を INSERT せずログのみ)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      detect_only:
        description: "新サービス検知のみ実行"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: scraper
  cancel-in-progress: false   # 二重実行防止。実行中は後続をキャンセルしない

jobs:
  scrape:
    name: スクレイプ & 差分生成
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── セットアップ ───────────────────────────────────────────────
      - name: コードチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: 依存パッケージインストール
        run: pip install -r scraper/requirements.txt

      # ─── スクレイプ実行 ────────────────────────────────────────────
      - name: 料金スクレイプ
        if: ${{ github.event.inputs.detect_only != 'true' }}
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL }}
          LOG_LEVEL: INFO
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python main.py $DRY_RUN_FLAG

      # ─── 新サービス検知（スクレイプとは独立して毎回実行） ────────────
      - name: 新サービス検知
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LOG_LEVEL: INFO
        run: python new_service_detector.py 25

      # ─── 失敗時の Slack 通知 ───────────────────────────────────────
      - name: スクレイパー失敗通知
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🔴 スマホ料金診断スクレイパーが失敗しました。<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|実行ログを確認>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true   # 通知失敗でワークフロー全体が失敗扱いにならないよう

  # ─── 週次: データ品質チェック ────────────────────────────────────────
  quality-check:
    name: データ品質チェック（週次）
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 22 * * 0')
    needs: scrape

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt

      - name: 公開プランの整合性チェック
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          from validator import validate_all

          plans_path = Path('../public/data/plans.json')
          plans = json.loads(plans_path.read_text())
          results = validate_all(plans)
          errors = [r for r in results if not r.ok]
          if errors:
              for e in errors:
                  print(f'FAIL: {e.plan_id} — {e.errors}')
              sys.exit(1)
          print(f'OK: {len(results)} plans validated')
          "
